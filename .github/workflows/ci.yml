name: SocialConnect CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: socialconnect
          POSTGRES_PASSWORD: socialconnect
          POSTGRES_DB: socialconnect_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U socialconnect -d socialconnect_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: postgresql://socialconnect:socialconnect@localhost:5432/socialconnect_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-at-least-32-characters
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-characters
      NODE_ENV: test
      SMS_PROVIDER: development
      DISABLE_BACKGROUND_JOBS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma validate
      - run: npx prisma migrate deploy
      - run: npm run seed
      - run: npm test
      - run: npm run test:integration
        env:
          INTEGRATION_DATABASE_URL: postgresql://socialconnect:socialconnect@localhost:5432/socialconnect_test?schema=public

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
