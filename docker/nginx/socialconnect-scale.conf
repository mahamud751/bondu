# Multi-instance / global-scale edge template
# Use with: api1, api2, api3 (or docker compose --scale api=3)

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# Per-IP rate limits (edge)
limit_req_zone $binary_remote_addr zone=api_limit:20m rate=40r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

upstream socialconnect_api {
  least_conn;
  # sticky sessions help Socket.IO when Redis adapter is unavailable;
  # with Redis adapter (default), any node can handle upgrades.
  server api:3000 max_fails=3 fail_timeout=10s;
  # server api2:3000 max_fails=3 fail_timeout=10s;
  # server api3:3000 max_fails=3 fail_timeout=10s;
  keepalive 64;
}

upstream socialconnect_admin {
  server admin:3000;
}

server {
  listen 80;
  server_name _;
  location /healthz { access_log off; return 200 "ok\n"; }
  location / { return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl http2;
  server_name _;
  server_tokens off;
  client_max_body_size 26m;
  limit_conn addr 40;

  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:20m;
  ssl_session_timeout 1d;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;

  # Static / gift FX packs (optional CDN origin cache)
  location /cdn/ {
    proxy_pass http://socialconnect_api;
    proxy_cache_valid 200 1h;
    add_header Cache-Control "public, max-age=3600";
  }

  location /api/ {
    limit_req zone=api_limit burst=120 nodelay;
    proxy_pass http://socialconnect_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 120s;
  }

  location /realtime/ {
    proxy_pass http://socialconnect_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  location / {
    proxy_pass http://socialconnect_admin;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
  }
}
